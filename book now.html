<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>დაჯავშნა</title>
    <link rel="stylesheet" href="book now.css">
</head>
<body>
    <header>
          <div class="logo">GeoVoyage</div>
    <nav>
          <a href="index.html">მთავარი</a>
          <a href="home.html">ქალაქები</a>
          <a href="about us.html">ჩვენს შესახებ</a>
          <a href="login.html">რეგისტრაცია</a>
        </nav>
  </header>
 

    <div class="container">
        <h1>დაჯავშნე მოგზაურობა</h1>

        <form class="booking-form">
            
            <label>სახელი</label>
            <input type="text" id="name" placeholder="შეიყვანე სახელი" required>

            <label>ელ.ფოსტა</label>
            <input type="email"  id="email" placeholder="შეიყვანე ელ.ფოსტა" required>

            <label>ადგილის არჩევა</label>
            <select required>
                <option value="">აირჩიე ადგილი</option>
                <option>ყაზბეგი</option>
                <option>გუდაური</option>
                <option>ბათუმი</option>
                <option>სვანეთი</option>
                <option>ზუგდიდი</option>
                <option>თბილისი</option>
                <option>ბაკურიანი</option>
                <option>ახალციხე</option>
                <option>მცხეთა</option>
                <option>ქუთაისი</option>
            </select>

            <label>წასვლის თარიღი</label>
            <input type="date" id="date" required>

            <label>დამატებითი ინფორმაცია</label>
            <textarea id="info" placeholder="დაწერე დამატებითი მოთხოვნა"></textarea>

            <button type="submit" id="btn">დაჯავშნა</button>

        </form>
    </div>
     <footer> 
        © 2025 Travel Geo — ყველა უფლება დაცულია
    </footer>
    <script src="index.js"></script>
</body>
</html>
